openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental Clinic Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: patients
    description: Patient management
  - name: op-records
    description: OP record management
  - name: revisits
    description: Revisit management
  - name: diagnoses
    description: Diagnosis management
  - name: prescriptions
    description: Prescription management
  - name: treatments
    description: Treatment management
  - name: invoices
    description: Invoice management
  - name: followups
    description: Follow-up management
  - name: dashboard
    description: Dashboard statistics
  - name: notifications
    description: Notifications
  - name: reports
    description: Reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Patients
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients with optional search
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name, patientId, or phone
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Register a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  # OP Records
  /op-records:
    get:
      operationId: listOpRecords
      tags: [op-records]
      summary: List OP records
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of OP records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpRecord"
    post:
      operationId: createOpRecord
      tags: [op-records]
      summary: Create a new OP record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpRecord"

  /op-records/{id}:
    get:
      operationId: getOpRecord
      tags: [op-records]
      summary: Get OP record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OP Record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpRecord"
    patch:
      operationId: updateOpRecord
      tags: [op-records]
      summary: Update OP record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpRecordUpdate"
      responses:
        "200":
          description: Updated OP record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpRecord"

  # Revisits
  /revisits:
    get:
      operationId: listRevisits
      tags: [revisits]
      summary: List revisits for an OP record
      parameters:
        - name: opRecordId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of revisits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Revisit"
    post:
      operationId: createRevisit
      tags: [revisits]
      summary: Create a new revisit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisitInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revisit"

  # Diagnoses
  /diagnoses:
    get:
      operationId: listDiagnoses
      tags: [diagnoses]
      summary: List diagnoses for a patient
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: opRecordId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of diagnoses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnosis"
    post:
      operationId: createDiagnosis
      tags: [diagnoses]
      summary: Add a diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"

  /diagnoses/{id}:
    patch:
      operationId: updateDiagnosis
      tags: [diagnoses]
      summary: Update a diagnosis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnosis"

  # Prescriptions
  /prescriptions:
    get:
      operationId: listPrescriptions
      tags: [prescriptions]
      summary: List prescriptions for a patient
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prescription"
    post:
      operationId: createPrescription
      tags: [prescriptions]
      summary: Add a prescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"

  /prescriptions/{id}:
    patch:
      operationId: updatePrescription
      tags: [prescriptions]
      summary: Update a prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
    delete:
      operationId: deletePrescription
      tags: [prescriptions]
      summary: Delete a prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Treatments
  /treatments:
    get:
      operationId: listTreatments
      tags: [treatments]
      summary: List treatments for a patient
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Treatment"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Add a treatment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  /treatments/{id}:
    patch:
      operationId: updateTreatment
      tags: [treatments]
      summary: Update a treatment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  # Invoices
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: paymentStatus
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Follow-ups
  /followups:
    get:
      operationId: listFollowups
      tags: [followups]
      summary: List follow-ups
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUp"
    post:
      operationId: createFollowup
      tags: [followups]
      summary: Schedule a follow-up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"

  /followups/{id}:
    patch:
      operationId: updateFollowup
      tags: [followups]
      summary: Update follow-up status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"

  # Dashboard
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-patients:
    get:
      operationId: getRecentPatients
      tags: [dashboard]
      summary: Get recently registered patients
      responses:
        "200":
          description: Recent patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"

  /dashboard/today-appointments:
    get:
      operationId: getTodayAppointments
      tags: [dashboard]
      summary: Get today's appointments/visits
      responses:
        "200":
          description: Today appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpRecord"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get pending notifications (follow-ups, incomplete treatments)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  # Reports
  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      summary: Get daily report stats
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly report stats
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "YYYY-MM format"
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role, status]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [administrator, receptionist, doctor]
        status:
          type: string
          enum: [active, inactive]
        lastLoginAt:
          type: ["string", "null"]

    UserInput:
      type: object
      required: [username, password, role, fullName]
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [administrator, receptionist, doctor]

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        role:
          type: string
          enum: [administrator, receptionist, doctor]
        status:
          type: string
          enum: [active, inactive]
        password:
          type: string

    Patient:
      type: object
      required: [id, patientId, fullName, age, gender, contactNumber, status, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: string
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        contactNumber:
          type: string
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        emergencyPhone:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        createdAt:
          type: string

    PatientInput:
      type: object
      required: [fullName, age, gender, contactNumber]
      properties:
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        contactNumber:
          type: string
        email:
          type: string
        address:
          type: string
        emergencyContact:
          type: string
        emergencyPhone:
          type: string
        bloodGroup:
          type: string

    PatientUpdate:
      type: object
      properties:
        fullName:
          type: string
        age:
          type: integer
        gender:
          type: string
        contactNumber:
          type: string
        email:
          type: string
        address:
          type: string
        emergencyContact:
          type: string
        emergencyPhone:
          type: string
        bloodGroup:
          type: string
        status:
          type: string
          enum: [active, archived]

    OpRecord:
      type: object
      required: [id, opNumber, patientId, startDate, expiryDate, status, visitReason, createdAt]
      properties:
        id:
          type: integer
        opNumber:
          type: string
        patientId:
          type: integer
        patientName:
          type: ["string", "null"]
        startDate:
          type: string
        expiryDate:
          type: string
        status:
          type: string
          enum: [active, expired]
        visitReason:
          type: string
        createdAt:
          type: string

    OpRecordInput:
      type: object
      required: [patientId, visitReason]
      properties:
        patientId:
          type: integer
        visitReason:
          type: string

    OpRecordUpdate:
      type: object
      properties:
        visitReason:
          type: string
        status:
          type: string
          enum: [active, expired]

    Revisit:
      type: object
      required: [id, opRecordId, visitDate, createdAt]
      properties:
        id:
          type: integer
        opRecordId:
          type: integer
        visitDate:
          type: string
        notes:
          type: ["string", "null"]
        doctorId:
          type: ["integer", "null"]
        doctorName:
          type: ["string", "null"]
        createdAt:
          type: string

    RevisitInput:
      type: object
      required: [opRecordId, visitDate]
      properties:
        opRecordId:
          type: integer
        visitDate:
          type: string
        notes:
          type: string
        doctorId:
          type: integer

    Diagnosis:
      type: object
      required: [id, patientId, notes, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        opRecordId:
          type: ["integer", "null"]
        notes:
          type: string
        createdBy:
          type: ["integer", "null"]
        createdByName:
          type: ["string", "null"]
        createdAt:
          type: string

    DiagnosisInput:
      type: object
      required: [patientId, notes]
      properties:
        patientId:
          type: integer
        opRecordId:
          type: integer
        notes:
          type: string

    DiagnosisUpdate:
      type: object
      properties:
        notes:
          type: string

    Prescription:
      type: object
      required: [id, patientId, medicineName, dosage, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        medicineName:
          type: string
        dosage:
          type: string
        instructions:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        createdAt:
          type: string

    PrescriptionInput:
      type: object
      required: [patientId, medicineName, dosage]
      properties:
        patientId:
          type: integer
        medicineName:
          type: string
        dosage:
          type: string
        instructions:
          type: string
        recommendations:
          type: string

    PrescriptionUpdate:
      type: object
      properties:
        medicineName:
          type: string
        dosage:
          type: string
        instructions:
          type: string
        recommendations:
          type: string

    Treatment:
      type: object
      required: [id, patientId, procedure, status, createdAt]
      properties:
        id:
          type: integer
        patientId:
          type: integer
        toothNumber:
          type: ["string", "null"]
        procedure:
          type: string
        status:
          type: string
          enum: [planned, in-progress, completed, cancelled]
        cost:
          type: ["number", "null"]
        timelineOrder:
          type: ["integer", "null"]
        createdAt:
          type: string

    TreatmentInput:
      type: object
      required: [patientId, procedure, status]
      properties:
        patientId:
          type: integer
        toothNumber:
          type: string
        procedure:
          type: string
        status:
          type: string
          enum: [planned, in-progress, completed, cancelled]
        cost:
          type: number
        timelineOrder:
          type: integer

    TreatmentUpdate:
      type: object
      properties:
        toothNumber:
          type: string
        procedure:
          type: string
        status:
